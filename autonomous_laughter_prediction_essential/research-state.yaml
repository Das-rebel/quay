paper_narrative:
  current: "XLM-R word-level laughter prediction achieves F1=0.819 (IoU-F1=0.880).\
    \ We discovered LLM-generated biosemiotic features contain critical label leakage\
    \ (F1=0.829 from features alone), invalidating prior ablation studies. Text-only\
    \ is the ceiling \u2014 audio adds noise at word-level. Span reformulation is\
    \ the primary architectural contribution."
  three_paths:
    path_b_current: "Audio fails \u2192 'StandUp NER: Laughter as Sequence Labeling'\
      \ \u2014 ACL SRW \u2014 2-3 weeks"
    path_a_if_utterance_works: "Utterance audio works \u2192 'Multilingual Laughter\
      \ via Multimodal Fusion' \u2014 EMNLP \u2014 4-6 weeks"
    path_c_if_weak_labels_broken: "Weak labels broken \u2192 'Weak Supervision: When\
      \ YouTube Subtitles Lie' \u2014 EMNLP eval \u2014 3-4 weeks"
