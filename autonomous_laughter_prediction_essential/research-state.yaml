hypotheses:
  h1_1_pause_predicts_laughter:
    hypothesis_slug: h1_1_pause_predicts_laughter
    hypothesis_short: "H1.1: Longer pause before word \u2192 higher laughter probability"
    status: completed
    metric_value: 0.13
    metric_name: Cohen's d effect size
    baseline: 0.8
    delta: '-0.67'
    direction: negative
    session: 1
    data: 199,992 words from 26 videos, 12.6% laughter rate
    key_learning: "Subtitle timestamps too coarse \u2014 real pause detection needs\
      \ librosa on audio WAV files"
    alternative_interpretation: Purandare's 0.8s threshold is real but undetectable
      from subtitle timing
    paper_angle: "Comedic pause is real (2\xD7 laughter rate at >1s) but invisible\
      \ at subtitle precision"
  h1_5_pause_alone_classifies:
    hypothesis_slug: h1_5_pause_alone_classifies
    hypothesis_short: "H1.5: Pause duration alone achieves F1 \u2265 0.55"
    status: completed
    metric_value: 0.2
    metric_name: F1 from pause features only
    baseline: 0.55
    delta: '-0.35'
    direction: negative
    session: 4
    data: 73,947 word-level features, per-video split, Logistic Regression
    key_learning: "Temporal context alone insufficient \u2014 F0/energy features also\
      \ needed"
    paper_angle: Word-level pause features are too weak for practical use
  h2_5_multiword_span_artifact:
    hypothesis_slug: h2_5_multiword_span_artifact
    hypothesis_short: "H2.5: \u226570% of laughter labels form multi-word spans"
    status: completed
    metric_value: 100.0
    metric_name: Percent multi-word spans
    baseline: 70.0
    delta: '+30.0'
    direction: positive_but_misleading
    session: 2
    data: 198 laughter spans from 15 videos, avg length 19.4 words
    key_learning: "100% multi-word is ARTIFACT of \xB15s window labeling, not natural\
      \ laughter structure"
    paper_angle: Span detection is valid task reformulation but claim must be qualified
  h4_4_biosemiotic_label_leakage:
    hypothesis_slug: h4_4_biosemiotic_label_leakage
    hypothesis_short: 'H4.4: Biosemiotic features improve XLM-R F1 by >0.01'
    status: completed
    metric_value: 0.829
    metric_name: F1 from biosemiotic features ALONE (no text)
    baseline: 0.819
    delta: '+0.010'
    direction: critical_negative_result
    session: 2
    data: LogisticRegression on 10 biosemiotic dimensions, NO text input
    key_learning: "LLM-generated biosemiotic features encode labels into feature values\
      \ \u2014 critical label leakage"
    paper_angle: 'Publishable negative result: synthetic feature generation by LLMs
      can invalidate ablation studies'
  h4_5_split_leakage:
    hypothesis_slug: h4_5_split_leakage
    hypothesis_short: 'H4.5: Random cross-video split introduces >3% leakage vs per-show
      split'
    status: completed
    metric_value: 1.9
    metric_name: F1 gap random vs per-show (%)
    baseline: 3.0
    delta: '-1.1'
    direction: negative
    session: 2
    data: Random split F1=0.218, per-show split F1=0.199
    key_learning: Minor leakage exists but below 3% significance threshold
    paper_angle: Use per-show splits for final paper; report random-split as upper
      bound
  h4_6_standup4ai_baseline:
    hypothesis_slug: h4_6_standup4ai_baseline
    hypothesis_short: 'H4.6: StandUp4AI dataset provides external benchmark for word-level
      laughter prediction'
