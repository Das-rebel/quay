  h9_multimodal_fusion_frozen:
    hypothesis_slug: h9_multimodal_fusion_frozen
    hypothesis_short: "H9: Gated fusion (frozen XLM-R + frozen WavLM) beats best single modality"
    status: completed
    metric_value: 0.4196
    metric_name: Val F1 (gated fusion, best epoch)
    baseline: 0.4155
    delta: '+0.0041'
    direction: marginal_positive
    session: 5
    data: 13,760 utterances from 68 videos, per-video split, T4 GPU
    key_learning: "Gate converged to 1.0 within 2 epochs — model learned to fully discard frozen XLM-R text features. Fusion F1 (0.4196) ≈ WavLM-only (0.4155). Frozen multilingual text adds no complementary signal for laughter detection."
    per_model:
      text_only_frozen_xlmr: {f1: 0.2471, epoch: 8, params: 197378}
      wavlm_only: {f1: 0.4155, epoch: 1, params: 213442}
      gated_fusion: {f1: 0.4196, epoch: 1, gate: 0.993, params: 410819}
    paper_angle: "Laughter is fundamentally acoustic: gated fusion learns to ignore multilingual text entirely. Publishable negative result demonstrating that frozen language encoders provide no signal beyond speech representations."
    next: "H9.1: Fine-tune XLM-R layers 9-12, retrain baselines and fusion for fair comparison"

