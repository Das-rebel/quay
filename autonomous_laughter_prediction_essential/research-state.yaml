    metric_name: TF-IDF F1 on StandUp4AI 4-CSV subset
    baseline: 0.25
    delta: '+0.48'
    direction: positive
    session: 1
    data: 4 CSVs, 3,207 words from StandUp4AI dataset
    key_learning: StandUp4AI has clear signal; external benchmark available
  h5_temporal_position_show_structure:
    hypothesis_slug: h5_temporal_position_show_structure
    hypothesis_short: 'H5: Laughter rate varies by position in show (peak at 20-30%)'
    status: completed
    metric_value: 4e-143
    metric_name: Chi-square p-value for temporal position effect
    baseline: 0.05
    delta: '-1.0'
    direction: positive
    session: 3
    data: Word-level temporal positions across full show durations
    key_learning: Show-level structural pattern is real (p=4e-143) but cannot be used
      as word-level feature
    paper_angle: "Cannot aggregate to word-level \u2014 only utterance/show-level\
      \ useful"
  h6_1_f0_drop_punchline:
    hypothesis_slug: h6_1_f0_drop_punchline
    hypothesis_short: 'H6.1: F0 DROP at punchlines (Pickering 2009, Cohen''s d=0.24)'
    status: completed
    metric_value: 0.063
    metric_name: Cohen's d for F0 mean difference
    baseline: 0.5
    delta: '-0.437'
    direction: positive_but_negligible
    session: 4
    data: 73,947 word-level features, 7,074 laugh vs 53,401 non-laugh, 50 videos
    statistics:
      f0_mean_laugh: 202.0
      f0_mean_nonlaugh: 207.1
      f0_delta_hz: 5.0
      p_value: 7.54e-07
      distribution_overlap: 0.98
    classifier_result:
      f0_only_f1: 0.24
      energy_only_f1: 0.24
      f0_plus_energy_f1: 0.27
      all_features_f1: 0.25
    key_learning: "F0 DROP is real (p<10\u207B\u2076) but negligible (d=0.063) \u2014\
      \ studio editing averages out prosody"
    paper_angle: 'Textbook ''big data significance trap'': N=60K makes trivially small
      effects statistically significant'
